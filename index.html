<html lang="en">
  <head>
    <title>FitbitToDrip</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>

  <body>
    <div class="m-4" style="max-width: 30rem; font-family: consolas">
      <form class="needs-validation" id="files-form">
        <div class="mb-2" id="cycles-input">
          <label for="cyclesFile" class="form-label m-1">cycles.csv</label>
          <input type="file" class="form-control" id="cyclesFile" accept=".csv,text/csv" required>
          <div class="form-text">Required</div>
        </div>
        <div class="mb-2" id="symptoms-input">
          <label for="symptomsFile" class="form-label m-1">symptoms.csv</label>
          <input type="file" class="form-control" id="symptomsFile" accept=".csv,text/csv">
        </div>
        <div class="my-4">
          <button class="btn btn-dark" type="submit" id="upload-btn">
            <i class="bi bi-upload"></i>
            Upload
          </button>
        </div>
      </form>
      <hr>
      <div id="contact" class="my-2 small">
        For any issues, please reach out here: <a href="https://github.com/pc592/FitbitToDrip/issues">FitbitToDrip/issues</a>
      </div>
      <a href="#" class="btn btn-dark my-2 disabled" tabindex="-1" aria-disabled="true" role="button" id="download-btn">
        <i class="bi bi-download"></i>
        Download
      </a>
      <div id="msgs-container"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script type="module" src="src/index.ts"></script>
  </body>
</html>
